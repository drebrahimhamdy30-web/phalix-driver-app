name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.29.x: أول سلسلة تستخدم Kotlin DSL (build.gradle.kts) لتطابق تعديلات الـ workflow،
          # ولا تزال على AGP 8 / Gradle 8 (متوافقة مع ota_update 6.0.0). عدم التثبيت يقفز إلى
          # AGP 9 (jcenter محذوف) فيكسر البناء.
          flutter-version: '3.29.3'

      - name: Scaffold Android project
        run: |
          flutter create --org com.phalix --project-name driver --platforms=android /tmp/scaffold
          cp -r /tmp/scaffold/android ./android
          # نغمة الإشعار
          mkdir -p android/app/src/main/res/raw
          cp raw_assets/alert.mp3 android/app/src/main/res/raw/alert.mp3
          echo "=== تأكيد وجود ملف الصوت ==="
          ls -la android/app/src/main/res/raw/
          # أذونات الإشعارات + الخدمة الدائمة
          sed -i 's#<application#<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT"/>\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>\n    <application#' android/app/src/main/AndroidManifest.xml
          # تعريف خدمة الخلفية الدائمة
          sed -i 's#</application>#    <service android:name="com.pravera.flutter_foreground_task.service.ForegroundService" android:foregroundServiceType="dataSync" android:exported="false" android:stopWithTask="false"/>\n    </application>#' android/app/src/main/AndroidManifest.xml
          echo "=== المانيفست بعد التعديل ===" && cat android/app/src/main/AndroidManifest.xml
          # اسم التطبيق الظاهر
          sed -i 's#android:label="driver"#android:label="Phalix سائق"#' android/app/src/main/AndroidManifest.xml
          # السماح بفتح روابط https في المتصفح (url_launcher على أندرويد 11+)
          sed -i 's#<queries>#<queries>\n    <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent>#' android/app/src/main/AndroidManifest.xml
          # رفع الحد الأدنى لإصدار أندرويد (مطلوب لـ Firebase)
          sed -i 's#minSdk = flutter.minSdkVersion#minSdk = 23#' android/app/build.gradle.kts || true
          sed -i 's#minSdkVersion flutter.minSdkVersion#minSdkVersion 23#' android/app/build.gradle || true
          # رفع نسخة Kotlin لتتوافق مع الحزم الحديثة (device_info_plus وغيرها بُنيت بـ Kotlin 2.x)
          sed -i -E 's#(id\("org.jetbrains.kotlin.android"\) version ")[^"]+#\12.2.0#' android/settings.gradle.kts || true
          echo "=== settings.gradle.kts بعد رفع Kotlin ===" && cat android/settings.gradle.kts
          # توحيد نسخة NDK المطلوبة من الإضافات (27 متوافق للخلف)
          sed -i 's#ndkVersion = flutter.ndkVersion#ndkVersion = "27.0.12077973"#' android/app/build.gradle.kts || true
          # تفعيل core library desugaring (مطلوب لمكتبة الإشعارات)
          sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' android/app/build.gradle.kts
          printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n' >> android/app/build.gradle.kts
          # توقيع ثابت (عشان التحديثات تتثبّت فوق بعضها من غير حذف)
          cp android_keys/phalix-release.jks android/app/phalix-release.jks
          sed -i 's|    buildTypes {|    signingConfigs {\n        create("release") {\n            storeFile = file("phalix-release.jks")\n            storePassword = "phalix2026"\n            keyAlias = "phalix"\n            keyPassword = "phalix2026"\n        }\n    }\n\n    buildTypes {|' android/app/build.gradle.kts
          sed -i 's|signingConfig = signingConfigs.getByName("debug")|signingConfig = signingConfigs.getByName("release")|' android/app/build.gradle.kts
          echo "=== build.gradle.kts بعد التعديل ===" && cat android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phalix-driver-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK to Supabase (auto-update)
        run: |
          FUNC="https://rxtjoqulmgkkcohmgzgi.supabase.co/functions/v1/apk-publish"
          SECRET="87bcac4b4da9317f3b8716e6af9269533f8e2228cc0db43b"
          APK="build/app/outputs/flutter-apk/app-release.apk"
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//' | tr -d '[:space:]')
          echo "Publishing build $BUILD"
          # 1) رابط رفع موقّع
          SIGN=$(curl -s -X POST "$FUNC" -H "Content-Type: application/json" -d "{\"secret\":\"$SECRET\",\"action\":\"sign\"}")
          UURL=$(echo "$SIGN" | python3 -c "import sys,json;print(json.load(sys.stdin).get('full_url',''))")
          if [ -z "$UURL" ]; then echo "sign failed: $SIGN"; exit 1; fi
          # 2) رفع الـAPK
          curl -s -X PUT "$UURL" -H "Content-Type: application/vnd.android.package-archive" --data-binary @"$APK" -o /dev/null -w "upload: %{http_code}\n"
          # 3) نشر النسخة
          curl -s -X POST "$FUNC" -H "Content-Type: application/json" -d "{\"secret\":\"$SECRET\",\"action\":\"publish\",\"version_code\":$BUILD,\"version_name\":\"poll-v$BUILD\"}"
          echo ""
